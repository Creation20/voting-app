version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: voting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./voting_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./voting_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./voting_backend/.env.example
    environment:
      DB_HOST: db
    depends_on:
      - db

  frontend:
    build: ./voting-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
